<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" xintegrity="sha512-Fo3rlrZj/k7ujTnHg4Cfm3J7sYgwrVpSAe3BFA/k6iXhV/fXNqPzV8eT6o8z7J9R4F9pI7H1B/B5gGz7Qz5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100 min-h-screen font-sans flex items-center justify-center">

    <main class="bg-white p-10 rounded-xl shadow-2xl w-full max-w-lg">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-blue-800 mb-2">Welcome to the Portal</h1>
            <p class="text-gray-600 mb-8">Please select your role to continue.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Teacher/Admin Card -->
            <a href="attendance.html" 
               class="block bg-white p-8 rounded-lg border border-gray-200 shadow-md hover:shadow-lg hover:border-blue-500 transition-all duration-300 group">
                <div class="text-center">
                    <i class="fas fa-chalkboard-teacher text-5xl text-blue-700 group-hover:text-blue-800"></i>
                    <h2 class="text-xl font-semibold text-gray-800 mt-4">
                        Teacher
                    </h2>
                    <p class="text-sm text-gray-500">
                        (Admin Dashboard)
                    </p>
                </div>
            </a>

            <!-- Student Card -->
            <a href="student_portal.html" 
               class="block bg-white p-8 rounded-lg border border-gray-200 shadow-md hover:shadow-lg hover:border-blue-500 transition-all duration-300 group">
                <div class="text-center">
                    <i class="fas fa-user-graduate text-5xl text-blue-700 group-hover:text-blue-800"></i>
                    <h2 class="text-xl font-semibold text-gray-800 mt-4">
                        Student
                    </h2>
                    <p class="text-sm text-gray-500">
                        (View My Attendance)
                    </p>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
