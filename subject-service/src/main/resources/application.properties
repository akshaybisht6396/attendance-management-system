# --- Server Properties ---
# Run this service on a unique port
server.port=8082

# --- Microservice Registration Settings ---
# A unique name for this service in Eureka (e.g., subject-service)
spring.application.name=subject-service
# The address of your Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- MySQL Database Connection Settings ---
spring.datasource.url=jdbc:mysql://localhost:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Akshay@123

# --- JPA/Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# It's good practice to specify the dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect