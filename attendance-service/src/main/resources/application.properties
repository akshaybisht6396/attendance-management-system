# Server and Application Name Configuration
server.port=8081
spring.application.name=attendance-service

# --- Disable the Config Client ---
# This line tells the service NOT to look for a Config Server.
spring.cloud.config.enabled=false

# --- Eureka Client Configuration ---
# Tells this service where to find the Eureka Server to register itself.
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# --- MySQL Database Connection Settings ---
# Suggestion: Change student_db to a dedicated database like 'attendance_db'
spring.datasource.url=jdbc:mysql://localhost:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Akshay@123

# --- JPA/Hibernate Settings ---
# Automatically updates the database schema to match your entities.
spring.jpa.hibernate.ddl-auto=update
# Logs SQL queries to the console for debugging.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Circuit Breaker (Resilience4j) Settings ---
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health

resilience4j.circuitbreaker.instances.studentServiceBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.studentServiceBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.studentServiceBreaker.waitDurationInOpenState=10s